<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Mike's Ideas</title>
  <meta name="description" content="Browse the full portfolio — concert flyers, logos, branding, merch, dispensary labels, websites & event graphics." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ─── Navigation ─── -->
  <nav class="nav">
    <a class="nav-logo" href="index.html">Mike's Ideas</a>
    <div class="nav-links">
      <a href="work.html" class="active">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="nav-cta">Get in Touch</a>
    </div>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile Menu -->
  <div class="nav-mobile" id="navMobile">
    <a href="index.html">Home</a>
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- ─── Page Header ─── -->
  <div class="page-header">
    <h1 class="page-title">Selected<br>Work.</h1>
  </div>

  <!-- ─── Filter Bar ─── -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-bar-inner" id="filterInner">
      <button class="filter-btn active" data-cat="all">All Work</button>
      <!-- Injected by app.js -->
    </div>
  </div>

  <!-- Results count -->
  <p class="gallery-count" id="galleryCount"></p>

  <!-- ─── Gallery ─── -->
  <main class="gallery" id="gallery">
    <!-- Injected by app.js -->
  </main>

  <!-- ─── Lightbox ─── -->
  <div class="lightbox" id="lightbox">
    <div class="lb-topbar">
      <span class="lb-counter" id="lbCounter">1 / 1</span>
      <button class="lb-close" id="lbClose">✕</button>
    </div>
    <div class="lb-stage">
      <img class="lb-img" id="lbImg" src="" alt="" />
    </div>
    <div class="lb-infobar">
      <div class="lb-info">
        <span class="lb-cat" id="lbCat"></span>
        <span class="lb-title" id="lbTitle"></span>
      </div>
    </div>
    <button class="lb-arrow lb-prev" id="lbPrev">&#8592;</button>
    <button class="lb-arrow lb-next" id="lbNext">&#8594;</button>
  </div>

  <!-- ─── Footer ─── -->
  <footer class="footer">
    <span class="footer-logo">Mike's Ideas</span>
    <nav class="footer-nav">
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="footer-right">
      <p>© <span id="year"></span> Mike's Ideas</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
